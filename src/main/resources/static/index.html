<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-color: #D4AF8C; /* Warm neutral beige */
            --accent-hover: #C89F7B;
            --accent-light: rgba(212, 175, 140, 0.1);
            --bg-primary: #000000;
--bg-secondary: #1a1a1a;
            --bg-card: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-color: #404040;
            --border-light: #2f2f2f;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --shadow-strong: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a1a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2.5rem;
background: var(--bg-primary);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-strong);
            border: 1px solid var(--border-light);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-color), var(--accent-hover));
            border-radius: 20px 20px 0 0;
        }

        h1 {
            font-weight: 800;
            color: var(--text-primary);
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        h2 {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            padding-left: 1rem;
        }

        h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 24px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            width: 100%;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .form-control::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--accent-light);
            transform: translateY(-1px);
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            box-shadow: 0 4px 15px rgba(212, 175, 140, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover), #B8926A);
            box-shadow: 0 8px 25px rgba(212, 175, 140, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #c82333, #a71e2a);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 15px var(--shadow-light);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .script-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .script-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--accent-color);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .script-item:hover {
            background: var(--bg-card);
            transform: translateX(8px);
        }

        .script-item:hover::before {
            width: 4px;
        }

        .script-item:last-child {
            border-bottom: none;
        }

        .script-item-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            margin: auto;
            padding: 3rem;
            border-radius: 20px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            position: relative;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            animation: modalSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .close-button {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: var(--text-muted);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-button:hover {
            color: var(--accent-color);
            background: var(--accent-light);
            transform: rotate(90deg);
        }

        textarea {
            resize: vertical;
            min-height: 180px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        .feedback-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .feedback-error {
            background: linear-gradient(135deg, #dc3545, #fd7e14);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        /* Section styling */
        .section-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px var(--shadow-light);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--shadow-medium);
        }

        .scripts-list-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow-light);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .modal-content {
                padding: 2rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Script Manager</h1>

        <!-- Feedback Message -->
        <div id="feedbackMessage" class="hidden" style="border-radius: 12px; margin-bottom: 1.5rem;"></div>

        <!-- Script Creation Form -->
        <div class="section-card">
            <h2>Add New Script</h2>
            <div class="form-group">
                <label for="scriptName">Script Name:</label>
                <input type="text" id="scriptName" class="form-control" placeholder="e.g., My JavaScript Utility" required>
            </div>
            <div class="form-group">
                <label for="languageSelect">Programming Language:</label>
                <select id="languageSelect" class="form-control">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="ruby">Ruby</option>
                    <option value="go">Go</option>
                    <option value="php">PHP</option>
                    <option value="cpp">C++</option>
                    <option value="csharp">C#</option>
                    <option value="rust">Rust</option>
                    <option value="typescript">TypeScript</option>
                    <option value="bash">Bash</option>
                    <option value="sql">SQL</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="json">JSON</option>
                    <option value="yaml">YAML</option>
                    <option value="xml">XML</option>
                    <option value="markdown">Markdown</option>
                </select>
            </div>
            <div class="form-group">
                <label for="scriptContent">Script Content (Markdown supported):</label>
                <textarea id="scriptContent" class="form-control" rows="8" placeholder="```javascript
console.log('Hello World!');
```" required></textarea>
            </div>
            <button id="addScriptBtn" class="btn btn-primary" style="width: 100%;">Add Script</button>
        </div>

        <!-- Script Search Section -->
        <div class="section-card">
            <h2>Search Scripts</h2>
            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <input type="text" id="searchNameInput" class="form-control" placeholder="Enter script name to search" style="flex-grow: 1;">
                <div style="display: flex; gap: 0.75rem;">
                    <button id="searchScriptBtn" class="btn btn-primary">Search</button>
                    <button id="clearSearchBtn" class="btn btn-secondary">Clear</button>
                </div>
            </div>
        </div>

        <!-- Script List Section -->
        <div>
            <h2>Your Scripts</h2>
            <div id="scriptsList" class="scripts-list-container">
                <!-- Scripts will be loaded here by JavaScript -->
                <p style="text-align: center; color: var(--text-muted); padding: 2rem;" id="noScriptsMessage">No scripts found. Add one above!</p>
            </div>
        </div>
    </div>

    <!-- Script Details/Edit Modal -->
    <div id="scriptModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Script Details</h2>
            <input type="hidden" id="modalScriptId">
            <div class="form-group">
                <label for="modalScriptName">Name:</label>
                <input type="text" id="modalScriptName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="modalScriptContent">Content:</label>
                <textarea id="modalScriptContent" class="form-control" rows="10" required></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <button id="updateScriptBtn" class="btn btn-primary">Update Script</button>
                <button id="deleteScriptBtn" class="btn btn-danger">Delete Script</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Confirm Deletion</h2>
            <p style="margin-bottom: 2rem; color: var(--text-secondary);">Are you sure you want to delete this script?</p>
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/scripts'; 

        const scriptNameInput = document.getElementById('scriptName');
        const scriptContentInput = document.getElementById('scriptContent');
        const addScriptBtn = document.getElementById('addScriptBtn');
        const scriptsList = document.getElementById('scriptsList');
        const noScriptsMessage = document.getElementById('noScriptsMessage');

        const searchNameInput = document.getElementById('searchNameInput');
        const searchScriptBtn = document.getElementById('searchScriptBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        const scriptModal = document.getElementById('scriptModal');
        const closeButton = scriptModal.querySelector('.close-button');
        const modalScriptId = document.getElementById('modalScriptId');
        const modalScriptName = document.getElementById('modalScriptName');
        const modalScriptContent = document.getElementById('modalScriptContent');
        const updateScriptBtn = document.getElementById('updateScriptBtn');
        const deleteScriptBtn = document.getElementById('deleteScriptBtn');

        const confirmationModal = document.getElementById('confirmationModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const feedbackMessageDiv = document.getElementById('feedbackMessage');

        let scriptToDeleteId = null; 

        function showModal(modalElement) {
            modalElement.style.display = 'flex'; 
        }

        function hideModal(modalElement) {
            modalElement.style.display = 'none';
        }

        function showFeedback(type, text) {
            feedbackMessageDiv.textContent = text;
            feedbackMessageDiv.className = `p-4 mb-6 rounded-lg text-sm font-medium ${type === 'success' ? 'feedback-success' : 'feedback-error'}`;
            feedbackMessageDiv.style.display = 'block';
            setTimeout(() => {
                feedbackMessageDiv.style.display = 'none';
                feedbackMessageDiv.textContent = '';
            }, 3000); 
        }

        async function fetchScripts(searchName = '') {
            let url = API_BASE_URL;
            if (searchName) {
                url = `${API_BASE_URL}/byName/${encodeURIComponent(searchName)}`;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    if (response.status === 404 && searchName) {
                        renderScripts([]); 
                        return;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const scripts = searchName ? [data] : data;
                renderScripts(scripts);
            } catch (error) {
                console.error('Error fetching scripts:', error);
                showFeedback('error', 'Failed to load scripts. Is the backend running?');
                scriptsList.innerHTML = `<p class="text-center text-gray-500 py-4">Error loading scripts. Please check console.</p>`;
            }
        }

        function renderScripts(scripts) {
            scriptsList.innerHTML = ''; 
            if (scripts.length === 0) {
                if (searchNameInput.value.trim()) {
                    noScriptsMessage.textContent = `No script found with name "${searchNameInput.value.trim()}".`;
                } else {
                    noScriptsMessage.textContent = 'No scripts found. Add one above!';
                }
                noScriptsMessage.style.display = 'block';
                scriptsList.appendChild(noScriptsMessage);
            } else {
                noScriptsMessage.style.display = 'none';
                scripts.forEach(script => {
                    const scriptItem = document.createElement('div');
                    scriptItem.className = 'script-item';
                    scriptItem.dataset.id = script.id; // Store ID for easy access

                    const scriptNameSpan = document.createElement('span');
                    scriptNameSpan.className = 'script-item-name';
                    scriptNameSpan.textContent = script.name;

                    scriptItem.appendChild(scriptNameSpan);
                    scriptsList.appendChild(scriptItem);

                    scriptItem.addEventListener('click', () => openScriptModal(script.id));
                });
            }
        }

        async function openScriptModal(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/${id}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const script = await response.json();
                modalScriptId.value = script.id;
                modalScriptName.value = script.name;
                modalScriptContent.value = script.content;
                document.getElementById('modalTitle').textContent = `Script: ${script.name}`;
                showModal(scriptModal);
            } catch (error) {
                console.error('Error fetching script for modal:', error);
                showFeedback('error', 'Could not load script details.');
            }
        }

        addScriptBtn.addEventListener('click', async () => {
            const name = scriptNameInput.value.trim();
            const content = scriptContentInput.value.trim();

            if (!name || !content) {
                showFeedback('error', 'Please enter both script name and content.');
                return;
            }

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, content })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const newScript = await response.json();
                console.log('Script added:', newScript);
                showFeedback('success', `Script "${newScript.name}" added successfully!`);
                scriptNameInput.value = '';
                scriptContentInput.value = '';
                fetchScripts(); 
            } catch (error) {
                console.error('Error adding script:', error);
                showFeedback('error', 'Failed to add script. Check console for details.');
            }
        });

        updateScriptBtn.addEventListener('click', async () => {
            const id = modalScriptId.value;
            const name = modalScriptName.value.trim();
            const content = modalScriptContent.value.trim();

            if (!name || !content) {
                showFeedback('error', 'Please enter both script name and content for update.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, content })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const updatedScript = await response.json();
                console.log('Script updated:', updatedScript);
                showFeedback('success', `Script "${updatedScript.name}" updated successfully!`);
                hideModal(scriptModal);
                fetchScripts();
            } catch (error) {
                console.error('Error updating script:', error);
                showFeedback('error', 'Failed to update script. Check console for details.');
            }
        });

        deleteScriptBtn.addEventListener('click', () => {
            scriptToDeleteId = modalScriptId.value;
            hideModal(scriptModal);odal
            showModal(confirmationModal); 
        });

        confirmDeleteBtn.addEventListener('click', async () => {
            if (!scriptToDeleteId) return; 

            try {
                const response = await fetch(`${API_BASE_URL}/${scriptToDeleteId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                console.log('Script deleted:', scriptToDeleteId);
                showFeedback('success', `Script deleted successfully!`);
                hideModal(confirmationModal);
                scriptToDeleteId = null; 
                fetchScripts(); 
            } catch (error) {
                console.error('Error deleting script:', error);
                showFeedback('error', 'Failed to delete script. Check console for details.');
            }
        });

        cancelDeleteBtn.addEventListener('click', () => {
            hideModal(confirmationModal);
            scriptToDeleteId = null; 
        });

        searchScriptBtn.addEventListener('click', () => {
            const searchName = searchNameInput.value.trim();
            fetchScripts(searchName);
        });

        clearSearchBtn.addEventListener('click', () => {
            searchNameInput.value = ''; 
            fetchScripts(); 
        });

        searchNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchScriptBtn.click();
            }
        });

     
        closeButton.addEventListener('click', () => hideModal(scriptModal));
        window.addEventListener('click', (event) => {
            if (event.target == scriptModal) {
                hideModal(scriptModal);
            }
            if (event.target == confirmationModal) {
                hideModal(confirmationModal);
            }
        });

       
        document.addEventListener('DOMContentLoaded', fetchScripts);
    </script>
</body>
</html>
